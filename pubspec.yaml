name: zeladoria_digital
description: App de zeladoria urbana para o Hackathon IFSP Jacareí 2026.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Mapa do Google
  google_maps_flutter: ^2.5.3

  # Geolocalização
  geolocator: ^11.0.0

  # Firebase
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.5

  # UI extras
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
